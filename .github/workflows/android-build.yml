name: Build Android APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - user_type: ADMIN
            slug: admin
            scheme: admin
            package: com.luckybh.admin
            icon: admin-appicon.png
          - user_type: DEALER
            slug: dealer
            scheme: dealer
            package: com.luckybh.dealer
            icon: dealer-appicon.png
          - user_type: AGENT
            slug: agent
            scheme: agent
            package: com.luckybh.agent
            icon: agent-appicon.png

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Set userType to ${{ matrix.user_type }}
        run: |
          sed -i 's/userType: "[A-Z]*"/userType: "${{ matrix.user_type }}"/' utils/config.ts

      - name: Configure app.json for ${{ matrix.user_type }}
        run: |
          jq '.expo.slug = "${{ matrix.slug }}" |
              .expo.scheme = "${{ matrix.scheme }}" |
              .expo.android.package = "${{ matrix.package }}" |
              .expo.android.icon = "./assets/images/${{ matrix.icon }}" |
              .expo.icon = "./assets/images/${{ matrix.icon }}"' app.json > app.json.tmp
          mv app.json.tmp app.json

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          LOWER_TYPE=$(echo "${{ matrix.user_type }}" | tr '[:upper:]' '[:lower:]')
          cp "$APK_PATH" "${LOWER_TYPE}-app.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.user_type }}-apk
          path: "*-app.apk"
          retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: Set release tag
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "RELEASE_TAG=build-${TIMESTAMP}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Rename APKs with timestamp
        run: |
          cd apks
          for f in *.apk; do
            base="${f%.apk}"
            mv "$f" "${base}-${{ env.TIMESTAMP }}.apk"
          done
          ls -la

      - name: Create Release with all APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Build ${{ env.RELEASE_TAG }}"
          body: |
            Automated build from branch `${{ github.ref_name }}`

            **APKs included:**
            - ADMIN (com.luckybh.admin)
            - DEALER (com.luckybh.dealer)
            - AGENT (com.luckybh.agent)
          files: apks/*.apk

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Android Build Complete - All 3 APKs Ready"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          html_body: |
            <h2>Android Build Successful</h2>
            <p>
              <strong>Branch:</strong> ${{ github.ref_name }}<br>
              <strong>Author:</strong> ${{ github.actor }}
            </p>
            <h3>Download APKs:</h3>
            <ul>
              <li><a href="https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/admin-app-${{ env.TIMESTAMP }}.apk">ADMIN APK</a></li>
              <li><a href="https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/dealer-app-${{ env.TIMESTAMP }}.apk">DEALER APK</a></li>
              <li><a href="https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/agent-app-${{ env.TIMESTAMP }}.apk">AGENT APK</a></li>
            </ul>
            <p><a href="https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}">View Release Page</a></p>
